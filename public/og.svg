<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#15131c"/>
      <stop offset="100%" stop-color="#1d1a26"/>
    </linearGradient>
    <radialGradient id="orb" cx="0.85" cy="0.15" r="0.6">
      <stop offset="0%" stop-color="#22d3ee" stop-opacity="0.25"/>
      <stop offset="60%" stop-color="#22d3ee" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" fill="none" stroke="#ffffff" stroke-opacity="0.04" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#orb)"/>

  <!-- Logo (top-left) -->
  <g transform="translate(80, 80)">
    <rect width="48" height="48" rx="11" fill="#1d1a26" stroke="#322d3d"/>
    <path d="M 9 18 L 16 38 L 24 26 L 28 38 L 35 18" stroke="#f4f1fa" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <rect x="40" y="18" width="3" height="20" rx="0.75" fill="#22d3ee"/>
    <text x="68" y="32" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="600" fill="#f4f1fa">wordink</text>
  </g>

  <!-- Version pill -->
  <g transform="translate(80, 200)">
    <rect width="220" height="32" rx="16" fill="#22d3ee" fill-opacity="0.1" stroke="#22d3ee" stroke-opacity="0.3"/>
    <circle cx="16" cy="16" r="3" fill="#22d3ee"/>
    <text x="28" y="21" font-family="ui-monospace, monospace" font-size="12" fill="#22d3ee">v0.1.0 · early access</text>
  </g>

  <!-- Main headline -->
  <text x="80" y="320" font-family="system-ui, -apple-system, sans-serif" font-size="74" font-weight="600" fill="#f4f1fa" letter-spacing="-2">
    The document editor
  </text>
  <text x="80" y="400" font-family="system-ui, -apple-system, sans-serif" font-size="74" font-weight="600" fill="#a8a3b5" letter-spacing="-2">
    you copy into
  </text>
  <text x="80" y="480" font-family="system-ui, -apple-system, sans-serif" font-size="74" font-weight="600" fill="#22d3ee" letter-spacing="-2">
    your codebase.
  </text>

  <!-- Tagline -->
  <text x="80" y="540" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#a8a3b5">
    Everything Google Docs and Word do — but you own the source.
  </text>

  <!-- Install command at bottom -->
  <g transform="translate(80, 568)">
    <rect width="320" height="38" rx="6" fill="#1d1a26" stroke="#322d3d"/>
    <text x="14" y="25" font-family="ui-monospace, monospace" font-size="14" fill="#22d3ee">$</text>
    <text x="32" y="25" font-family="ui-monospace, monospace" font-size="14" fill="#f4f1fa">npx wordink add</text>
    <text x="186" y="25" font-family="ui-monospace, monospace" font-size="14" fill="#22d3ee">editor</text>
  </g>

  <!-- URL bottom right -->
  <text x="1120" y="592" font-family="ui-monospace, monospace" font-size="14" fill="#756f82" text-anchor="end">
    wordink.dev
  </text>
</svg>
